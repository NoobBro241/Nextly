<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Habitfy — Clear Habits. Calm Focus.</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">

    <!-- SIDEBAR (Desktop) -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div>
          <h1>Habitfy</h1>
        </div>
      </div>

      <nav class="nav" id="nav">
        <button class="nav-btn active" data-view="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          <span>Dashboard</span>
        </button>
        <button class="nav-btn" data-view="goals">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          <span>Goals</span>
        </button>
        <button class="nav-btn" data-view="weekly">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
          <span>Weekly</span>
        </button>
        <button class="nav-btn" data-view="habits">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          <span>Habits</span>
        </button>
        <button class="nav-btn" data-view="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06"/></svg>
          <span>Settings</span>
        </button>
      </nav>
    </aside>

    <!-- MOBILE HEADER -->
    <header class="mobile-header">
      <div class="mobile-logo">
         <h1 id="mobilePageTitle">Dashboard</h1>
      </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="content">

      <div class="topbar">
        <div class="page-title">
          <h2 id="pageTitle">Dashboard</h2>
          <p id="pageSubtitle">Your essential focus for today.</p>
        </div>
        <div class="today-chip" id="todayChip"></div>
      </div>

      <!-- VIEW: DASHBOARD -->
      <section class="view active" data-view="dashboard" id="view-dashboard"></section>

      <!-- VIEW: GOALS -->
      <section class="view" data-view="goals" id="view-goals"></section>

      <!-- VIEW: WEEKLY PLAN -->
      <section class="view" data-view="weekly" id="view-weekly"></section>

      <!-- VIEW: HABITS (MANAGE) -->
      <section class="view" data-view="habits" id="view-habits"></section>

      <!-- VIEW: LIFE (AVATAR / ANALYTICS) -->

      <!-- VIEW: SETTINGS -->
      <section class="view" data-view="settings" id="view-settings"></section>

    </main>

    <!-- MOBILE NAV (BOTTOM) -->
    <nav class="mobile-nav">
      <ul class="mobile-nav-list">
        <li><button class="mobile-nav-btn active" data-view="dashboard"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span>Home</span></button></li>
        <li><button class="mobile-nav-btn" data-view="goals"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><span>Goals</span></button></li>
        <li><button class="mobile-nav-btn" data-view="weekly"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/></svg><span>Weekly</span></button></li>
        <li><button class="mobile-nav-btn" data-view="habits"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/></svg><span>Habits</span></button></li>
        <li><button class="mobile-nav-btn" data-view="settings"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg><span>Settings</span></button></li>
      </ul>
    </nav>

  </div>

  <!-- TOAST CONTAINER -->
  <div id="toastContainer" class="toast-container" aria-live="polite"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
