<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nextly — Clear Habits. Calm Focus.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="toastContainer" class="toast-container"></div>

  <!-- PROMPT 2: Authentication Screen Overlay -->
  <div id="authScreen" class="auth-screen">
    <div class="auth-card">
      <div class="brand" style="justify-content:center; border:none; padding-bottom:12px;">
        <div class="brand-icon" style="width:36px; height:36px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h1 style="font-size:1.35rem;">Nextly</h1>
      </div>
      <p class="tiny" style="text-align:center; margin-bottom:24px;">Clear Habits. Calm Focus. Cloud Sync.</p>

      <div class="custom-segmented-control auth-tabs" style="margin-bottom:20px; grid-template-columns:1fr 1fr;">
        <button type="button" class="segment-btn active" data-auth-tab="signin">Sign In</button>
        <button type="button" class="segment-btn" data-auth-tab="signup">Create Account</button>
      </div>

      <form id="authForm" class="grid" autocomplete="on" style="gap:14px;">
        <div class="field">
          <label for="authEmail">Email Address</label>
          <input id="authEmail" type="email" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label for="authPassword">Password</label>
          <input id="authPassword" type="password" placeholder="••••••••" minlength="6" required />
        </div>
        <div id="authError" class="auth-error" style="display:none;"></div>
        <button type="submit" id="authSubmitBtn" class="btn btn-primary" style="width:100%; margin-top:6px;">Sign In</button>
        <div style="text-align:center; margin-top:4px;">
          <button type="button" id="authForgotBtn" class="btn btn-text" style="font-size:0.75rem;">Forgot Password?</button>
        </div>
      </form>
    </div>
  </div>

  <header class="mobile-header">
    <div class="mobile-logo">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h1>Nextly</h1>
    </div>
    <div id="mobilePageTitle" style="font-weight: 600; font-size: 0.9rem; color: var(--text-2);">Dashboard</div>
  </header>

  <div class="app-container">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h1>Nextly</h1>
      </div>

      <nav class="nav">
        <button class="nav-btn active" data-view="dashboard">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
          Dashboard
        </button>
        <button class="nav-btn" data-view="goals">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>
          Goals
        </button>
        <button class="nav-btn" data-view="weekly">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
          Weekly Plan
        </button>
        <button class="nav-btn" data-view="habits">
          <svg viewBox="0 0 24 24"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
          Habits
        </button>
        <button class="nav-btn" data-view="settings">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          Settings
        </button>
      </nav>

      <!-- PROMPT 2: Logged-in User Badge in Sidebar -->
      <div id="sidebarUserBadge" class="sidebar-user-badge" style="display:none;">
        <div class="user-badge-info">
          <span id="sidebarUserEmail" class="user-badge-email">user@example.com</span>
          <span class="tiny" style="color:var(--accent-strong); font-size:0.65rem;">🟢 Cloud Sync Active</span>
        </div>
      </div>
    </aside>

    <main class="content">
      <header class="topbar">
        <div class="page-title">
          <h2 id="pageTitle">Dashboard</h2>
          <p id="pageSubtitle">Overview of routines, active goals, and daily progress.</p>
        </div>
        <div id="todayChip" class="today-chip">Today</div>
      </header>

      <section id="view-dashboard" class="view active" data-view="dashboard"></section>
      <section id="view-goals" class="view" data-view="goals"></section>
      <section id="view-weekly" class="view" data-view="weekly"></section>
      <section id="view-habits" class="view" data-view="habits"></section>
      <section id="view-settings" class="view" data-view="settings"></section>
    </main>
  </div>

  <nav class="mobile-nav">
    <ul class="mobile-nav-list">
      <li>
        <button class="mobile-nav-btn active" data-view="dashboard">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
          <span>Dash</span>
        </button>
      </li>
      <li>
        <button class="mobile-nav-btn" data-view="goals">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>
          <span>Goals</span>
        </button>
      </li>
      <li>
        <button class="mobile-nav-btn" data-view="weekly">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
          <span>Weekly</span>
        </button>
      </li>
      <li>
        <button class="mobile-nav-btn" data-view="habits">
          <svg viewBox="0 0 24 24"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
          <span>Habits</span>
        </button>
      </li>
      <li>
        <button class="mobile-nav-btn" data-view="settings">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          <span>Settings</span>
        </button>
      </li>
    </ul>
  </nav>

  <script type="module" src="js/app.js"></script>
</body>
</html>
